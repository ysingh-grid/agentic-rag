<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic RAG Studio</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blur: rgba(18, 18, 18, 0.7);
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --primary-color: #bb86fc;
            --primary-hover: #9965f4;
            --text-color: #e0e0e0;
            --text-muted: #888;
            --user-bubble: #2d2d2d;
            --bot-bubble: #1e1e1e;
            --border-color: #333;
            --error-color: #cf6679;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            background: var(--bg-blur);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { font-weight: 600; font-size: 1.2rem; color: var(--primary-color); }

        .header-actions { display: flex; gap: 1rem; align-items: center; }

        #status-indicator {
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--text-muted);
        }
        .status-dot.online { background-color: #03dac6; box-shadow: 0 0 8px #03dac6; }
        .status-dot.offline { background-color: var(--error-color); }

        button {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button:hover { background-color: #2a2a2a; }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-bubble);
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .blinking-cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--primary-color);
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 4px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .input-area {
            padding: 1.5rem 2rem;
            background: var(--bg-blur);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex-grow: 1;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 1rem 1.5rem;
            border-radius: 24px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        .send-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 0 1.5rem;
            font-weight: 600;
        }

        .send-btn:hover { background-color: var(--primary-hover); }
        
        .sys-msg {
            align-self: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0.5rem 0;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">Agentic RAG Studio</div>
        <div class="header-actions">
            <div id="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">Checking System...</span>
            </div>
            <button id="clear-btn">Clear Chat</button>
        </div>
    </header>

    <div class="chat-container" id="chat">
        <div class="message bot">Hello! I am connected to the Agentic RAG system. How can I help you today?</div>
    </div>

    <div class="input-area">
        <form class="input-wrapper" id="chat-form">
            <input type="text" id="query-input" placeholder="Ask a question about your documents..." autocomplete="off">
            <button type="submit" class="send-btn" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const API_BASE = ""; // hosted on same server
        const DEV_API_KEY = "dev_api_key_123";
        const headers = {
            "Authorization": `Bearer ${DEV_API_KEY}`,
            "Content-Type": "application/json"
        };
        
        const chatContainer = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.querySelector('.status-dot');
        const statusText = document.getElementById('status-text');

        // Check health on load
        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    statusDot.classList.add('online');
                    statusText.textContent = 'System Online';
                } else {
                    throw new Error('Offline');
                }
            } catch (err) {
                statusDot.classList.add('offline');
                statusText.textContent = 'System Offline';
                addSystemMessage("Cannot connect to backend. Please check if the server is running.");
            }
        }
        checkHealth();

        function addMessage(text, sender) {
            const el = document.createElement('div');
            el.className = `message ${sender}`;
            el.textContent = text;
            chatContainer.appendChild(el);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return el;
        }

        function addSystemMessage(text) {
            const el = document.createElement('div');
            el.className = 'sys-msg';
            el.textContent = text;
            chatContainer.appendChild(el);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById('clear-btn').addEventListener('click', async () => {
            try {
                const res = await fetch(`${API_BASE}/clear-session`, {
                    method: 'POST',
                    headers: { "Authorization": `Bearer ${DEV_API_KEY}` },
                    credentials: 'include'  // include cookies so session is identified server-side
                });
                if (res.ok) {
                    chatContainer.innerHTML = '';
                    addSystemMessage("Session history cleared. Starting a new conversation.");
                } else {
                    addSystemMessage("Could not clear session. Please try again.");
                }
            } catch (err) {
                console.error('Clear session error:', err);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;

            // Optimistic UI update
            addMessage(query, 'user');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;

            const botMsgEl = document.createElement('div');
            botMsgEl.className = 'message bot';

            // Show spinner while retrieval + rerank run (before first token)
            const loader = document.createElement('div');
            loader.className = 'loader';
            loader.style.display = 'block';
            botMsgEl.appendChild(loader);
            chatContainer.appendChild(botMsgEl);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 20-second slow-generation warning timer
            let slowTimer = setTimeout(() => {
                const hint = botMsgEl.querySelector('.slow-hint');
                if (hint) hint.style.display = 'block';
            }, 20000);

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ query })
                });

                if (response.status === 401) {
                    botMsgEl.textContent = "Unauthorised. Check your API key.";
                    return;
                }
                if (response.status === 429) {
                    botMsgEl.textContent = "Too many requests. Please wait a moment.";
                    return;
                }
                if (response.status === 503) {
                    const retryAfter = response.headers.get('Retry-After') || '30';
                    botMsgEl.textContent = `System is at capacity. Retrying in ${retryAfter}s…`;
                    setTimeout(() => form.dispatchEvent(new Event('submit')), parseInt(retryAfter) * 1000);
                    return;
                }
                if (!response.ok) {
                    botMsgEl.textContent = `Error ${response.status}: ${response.statusText}`;
                    return;
                }

                // Transition: remove spinner, show cursor + slow-hint
                loader.remove();
                botMsgEl.innerHTML =
                    '<span class="content"></span>' +
                    '<span class="blinking-cursor"></span>' +
                    '<div class="slow-hint" style="display:none;font-size:0.8rem;color:var(--text-muted);margin-top:0.5rem">⏳ Still generating…</div>';
                const contentSpan = botMsgEl.querySelector('.content');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    // Skip the server-side slow nudge token — we handle it client-side
                    if (!chunk.includes('⏳ Still generating')) {
                        contentSpan.textContent += chunk;
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                botMsgEl.querySelector('.blinking-cursor').remove();

            } catch (err) {
                botMsgEl.textContent = 'Error generating response: ' + err.message;
            } finally {
                clearTimeout(slowTimer);
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        });
    </script>
</body>
</html>
